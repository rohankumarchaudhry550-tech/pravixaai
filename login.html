<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Pravixa AI</title>
  <link rel="icon" href="fa.png" type="image/png">
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#07111d;color:#eef7ff}a{color:inherit}.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:18px clamp(18px,5vw,72px);background:#081827;border-bottom:1px solid rgba(255,255,255,.08)}.brand{display:flex;align-items:center;gap:12px;text-decoration:none;font-weight:900}.brand img{height:42px}.links{display:flex;gap:18px;align-items:center}.links a{text-decoration:none;color:#bdd0e5}.cta{background:#00c896;color:#06111d!important;padding:10px 16px;border-radius:10px;font-weight:900}.page{min-height:calc(100vh - 79px);display:grid;grid-template-columns:1fr 440px;gap:40px;align-items:center;padding:54px clamp(18px,5vw,72px)}h1{font-size:clamp(2.2rem,5vw,4.4rem);line-height:1.05;margin:0 0 14px}p{color:#aec1d6;line-height:1.7}.card{background:#0d1d31;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.24)}label{display:block;margin:16px 0 7px;font-weight:800;color:#dceafa}input{width:100%;padding:13px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#081827;color:#fff}button{display:block;width:100%;margin-top:18px;border:0;border-radius:10px;padding:14px;background:#00c896;color:#06111d;font-weight:900;cursor:pointer}.notice{margin-top:14px;color:#9ee8d3}.error{color:#ffb3b3}.minor{display:flex;justify-content:space-between;gap:12px;margin-top:16px}.minor a{color:#9ee8d3;text-decoration:none}@media(max-width:820px){.page{grid-template-columns:1fr}.links{display:none}}
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/"><img src="logo.png" alt="Pravixa AI Logo">Pravixa AI</a>
    <div class="links"><a href="/">Home</a><a href="/services">Services</a><a href="/book-demo">Book Demo</a><a href="/contact">Contact</a><a class="cta" href="/signup">Signup</a></div>
  </nav>
  <main class="page">
    <section>
      <h1>Welcome Back</h1>
      <p>Access your AI dashboard securely. Review your account details, manage demos, and continue your automation onboarding.</p>
    </section>
    <section class="card">
      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Login</button>
        <div id="notice" class="notice" role="status"></div>
      </form>
      <div class="minor"><a href="/signup">Create account</a><a href="/">Back to website</a></div>
    </section>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (event) {
      event.preventDefault();
      const form = event.currentTarget;
      const notice = document.getElementById('notice');
      notice.className = 'notice';
      notice.textContent = '';
      const payload = {
        email: form.email.value.trim(),
        password: form.password.value
      };
      if (!payload.email || !payload.password) {
        notice.className = 'notice error';
        notice.textContent = 'Please enter your email and password.';
        return;
      }
      form.querySelector('button').disabled = true;
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Something went wrong. Please try again.');
        window.location.href = data.redirect || '/dashboard';
      } catch (error) {
        notice.className = 'notice error';
        notice.textContent = error.message;
      } finally {
        form.querySelector('button').disabled = false;
      }
    });
  </script>
</body>
</html>
